services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5010:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=launcherhero_starter;Username=postgres;Password=postgres"
      Jwt__Issuer: "LauncherHero.Starter"
      Jwt__Audience: "LauncherHero.Starter"
      Jwt__Secret: "DEV_ONLY_CHANGE_THIS_IN_PRODUCTION!!"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: launcherhero_starter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d launcherhero_starter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
